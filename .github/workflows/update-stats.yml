name: update stats

on:
  schedule:
    - cron: "0 0 * * *" # tous les jours à minuit
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Invalide le cache github-readme-stats pour forcer le refresh
      - name: ping stats api
        run: |
          curl -s "https://github-readme-stats.vercel.app/api?username=0x36D76289&count_private=true" -o /dev/null
          curl -s "https://github-readme-stats.vercel.app/api/top-langs/?username=0x36D76289" -o /dev/null
          echo "Stats refreshed at $(date -u)"
